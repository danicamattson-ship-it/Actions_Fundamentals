name: CI Build Process for Docker Actions
on:
  push:
    branches: [ "main" ]
    paths: [ 'hello-world-docket-action/**' ]
  workflow_dispatch:

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run on my own container
        id: hello-action
        uses: ./hello-world-docker-action
        with:
          who-to-greet: '@danicamattson-ship-it'

      - name: Output time set in the container
        run:  echo "The time was ${{ steps.hello-action.outputs.time }} when the action said hello"

      
